name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the feature you'd like
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: Explain why this would be useful
    validations:
      required: true

  - type: dropdown
    id: affected-model
    attributes:
      label: Affected model
      options:
        - All models
        - Yutaki S
        - Yutaki S Combi
        - Yutaki S80
        - Yutaki M
        - Yutampo R32
        - Yutaki SC Lite
        - Not sure
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
