name: Bug Report
description: Report a bug with the Hitachi Yutaki integration
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "e.g., 2025.1.0"
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Integration version
      placeholder: "e.g., 2.0.1"
    validations:
      required: true

  - type: dropdown
    id: heat-pump-model
    attributes:
      label: Heat pump model
      options:
        - Yutaki S
        - Yutaki S Combi
        - Yutaki S80
        - Yutaki M
        - Yutampo R32
        - Yutaki SC Lite
        - Other
    validations:
      required: true

  - type: dropdown
    id: gateway-type
    attributes:
      label: Gateway type
      options:
        - ATW-MBS-02
        - HC-A16MB
        - HC-A64MB
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Copy relevant logs from Settings > System > Logs
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
