name = "hitachi-telemetry"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "hitachi-telemetry-archive"

[[analytics_engine_datasets]]
binding = "AE"
dataset = "hitachi_installations"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
